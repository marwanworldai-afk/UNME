<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UN ME Bank</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
  direction:rtl;
}

.hero{
  width:80%;
  height:40vh;
  margin:20px auto;
  border-radius:15px;
  overflow:hidden;
  position:relative;
}

.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.balanceBox{
  position:absolute;
  top:30%;
  right:15px;
}

.balanceTitle{
  color:#fff;
  font-size:40px;
}

.balanceValue{
  color:#00aaff;
  font-size:52px;
  font-weight:bold;
}

.balanceValue span{
  color:#0085c7;
  font-size:54px;
}

.topBtn{
  width:50%;
  margin:15px auto;
  padding:18px;
  text-align:center;
  background:#00aaff;
  border-radius:15px;
  cursor:pointer;
}

.grid{
  width:90%;
  margin:auto;
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  margin-top:40px;
}

.btn{
  flex:1 1 45%;
  padding:18px;
  text-align:center;
  background:#222;
  border-radius:10px;
  cursor:pointer;
}

.overlay{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
}

.modal{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:80%;
  background:#fff;
  color:#000;
  padding:20px;
  border-radius:10px;
  text-align:center;
}

.modal h3{
  margin-bottom:10px;
}

input{
  width:90%;
  padding:10px;
  margin:8px 0;
  text-align:center;
}

.actions{
  display:flex;
  gap:10px;
}

.actions div{
  flex:1;
  padding:10px;
  text-align:center;
  border-radius:8px;
  cursor:pointer;
}

.blue{background:#00aaff;color:#fff;}
.red{background:#ff3b3b;color:#fff;}
</style>
</head>

<body>

<div class="hero">
  <img src="bank.png">

  <div class="balanceBox">
    <div class="balanceTitle">رصيد البنك</div>
    <div class="balanceValue">
      <span id="bankBalance"></span> <span>EGP</span>
    </div>
  </div>
</div>

<div class="topBtn" onclick="goAccount()">فتح حساب</div>

<div class="grid">
  <div class="btn" onclick="openModal('transfer')">تحويل</div>
  <div class="btn" onclick="openModal('loan')">قرض</div>
  <div class="btn" onclick="openModal('close')">قفل حساب</div>
  <div class="btn" onclick="openModal('cert')">ربط شهادة</div>
  <div class="btn" onclick="openModal('fund')">تمويل البنك</div>
  <div class="btn" onclick="goClients()">إدارة العملاء</div>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, set, get, update, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB-vEbe_F8d6-vLZQpTfhtbv8k5n77tV1w",
  authDomain: "un-me-15395.firebaseapp.com",
  databaseURL: "https://un-me-15395-default-rtdb.firebaseio.com",
  projectId: "un-me-15395"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* رصيد البنك */
let bankBalance = 0;

onValue(ref(db,"bank/balance"), (snapshot)=>{
  bankBalance = snapshot.exists() ? snapshot.val() : 0;
  document.getElementById("bankBalance").innerText = bankBalance;
});

/* تنقل */
window.goAccount = ()=> location.href="hesab.html";
window.goClients = ()=> location.href="customers.html";

/* مودال */
window.openModal = (type)=>{
  document.getElementById("overlay").style.display="block";

  let html="";

  if(type==="transfer"){
    html=`
    <h3>تحويل</h3>
    <input id="acc" placeholder="رقم الحساب">
    <input id="amount" placeholder="المبلغ">
    <div class="actions">
      <div class="blue" onclick="transfer()">تحويل</div>
      <div class="red" onclick="closeModal()">إلغاء</div>
    </div>`;
  }

  if(type==="loan"){
    html=`
    <h3>قرض</h3>
    <input id="acc" placeholder="رقم الحساب">
    <input id="amount" placeholder="المبلغ">
    <div class="actions">
      <div class="blue" onclick="loan()">موافقة</div>
      <div class="red" onclick="closeModal()">إغلاق</div>
    </div>`;
  }

  if(type==="close"){
    html=`
    <h3>قفل حساب</h3>
    <input id="acc" placeholder="رقم الحساب">
    <div class="actions">
      <div class="blue" onclick="closeAccount()">قفل الحساب</div>
      <div class="red" onclick="closeModal()">إغلاق</div>
    </div>`;
  }

  if(type==="cert"){
    html=`
    <h3>ربط شهادة</h3>
    <input id="acc" placeholder="رقم الحساب">
    <input id="amount" placeholder="المبلغ">
    <div class="actions">
      <div class="blue" onclick="cert()">موافقة</div>
      <div class="red" onclick="closeModal()">إغلاق</div>
    </div>`;
  }

  if(type==="fund"){
    html=`
    <h3>تمويل البنك</h3>
    <input id="amount" placeholder="المبلغ">
    <div class="actions">
      <div class="blue" onclick="fund()">تمويل</div>
      <div class="red" onclick="closeModal()">إغلاق</div>
    </div>`;
  }

  document.getElementById("modal").innerHTML = html;
};

window.closeModal = ()=>{
  document.getElementById("overlay").style.display="none";
};

/* العمليات */

window.fund = async()=>{
  let amount = parseInt(document.getElementById("amount").value)||0;
  bankBalance += amount;
  await set(ref(db,"bank/balance"), bankBalance);
  closeModal();
};

window.transfer = async()=>{
  let acc=document.getElementById("acc").value;
  let amount=parseInt(document.getElementById("amount").value)||0;

  let snap = await get(ref(db,"users/"+acc));
  if(!snap.exists()){ alert("الحساب غير موجود"); return; }

  let user=snap.val();

  if(bankBalance>=amount){
    bankBalance-=amount;
    user.balance=(user.balance||0)+amount;

    await update(ref(db,"users/"+acc),user);
    await set(ref(db,"bank/balance"),bankBalance);

    closeModal();
  }else{
    alert("رصيد البنك غير كافي");
  }
};

window.loan = async()=>{
  let acc=document.getElementById("acc").value;
  let amount=parseInt(document.getElementById("amount").value)||0;

  let snap = await get(ref(db,"users/"+acc));
  if(!snap.exists()){ alert("الحساب غير موجود"); return; }

  let user=snap.val();
  user.balance=(user.balance||0)+amount;

  await update(ref(db,"users/"+acc),user);
  closeModal();
};

window.closeAccount = async()=>{
  let acc=document.getElementById("acc").value;

  let snap = await get(ref(db,"users/"+acc));
  if(!snap.exists()){ alert("الحساب غير موجود"); return; }

  await remove(ref(db,"users/"+acc));
  alert("تم حذف الحساب");
  closeModal();
};

window.cert = async()=>{
  let acc=document.getElementById("acc").value;
  let amount=parseInt(document.getElementById("amount").value)||0;

  let snap = await get(ref(db,"users/"+acc));
  if(!snap.exists()){ alert("الحساب غير موجود"); return; }

  let user=snap.val();

  if(user.balance>=amount){
    user.balance-=amount;
    await update(ref(db,"users/"+acc),user);
    alert("تم ربط الشهادة");
  }else{
    alert("رصيد غير كافي");
  }

  closeModal();
};

</script>

</body>
</html>
