<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>التبرعات</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#0f0f0f;
font-family:"Vazirmatn",sans-serif;
direction:rtl;
color:white;
}

.header{
display:flex;
align-items:center;
gap:15px;
padding:25px;
}

.backBtn{
width:55px;
height:55px;
border-radius:50%;
background:#1d1d1d;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
}

.title{
font-size:30px;
font-weight:bold;
}

.balanceCard{
width:85%;
margin:auto;
background:#00aaff;
padding:25px;
border-radius:20px;
text-align:center;
margin-top:20px;
}

.smallText{
font-size:20px;
}

.balance{
font-size:42px;
font-weight:bold;
margin-top:10px;
}

.section{
width:85%;
margin:25px auto;
}

.label{
font-size:20px;
margin-bottom:10px;
}

select,input{
width:100%;
height:60px;
background:#1c1c1c;
border:none;
border-radius:15px;
padding-right:15px;
font-size:20px;
color:white;
box-sizing:border-box;
}

.quickButtons{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:15px;
}

.quickButtons button{
background:#1e1e1e;
border:1px solid #333;
color:white;
padding:10px 20px;
border-radius:12px;
cursor:pointer;
}

.mainBtn{
width:85%;
height:60px;
display:block;
margin:35px auto;
background:#00aaff;
border:none;
border-radius:15px;
color:white;
font-size:22px;
font-weight:bold;
cursor:pointer;
}

.message{
text-align:center;
font-size:20px;
margin-bottom:30px;
padding:0 20px;
}

</style>
</head>

<body>

<div class="header">

<div class="backBtn"
onclick="history.back()">

<span class="material-symbols-outlined">
arrow_back
</span>

</div>

<div class="title">
التبرعات
</div>

</div>

<div class="balanceCard">

<div class="smallText">
رصيد الحساب الجاري
</div>

<div class="balance"
id="balance">
0 EGP
</div>

</div>

<div class="section">

<div class="label">
جهة التبرع
</div>

<select id="donationType">

<option>
مستشفى سرطان الأطفال
</option>

<option>
الهلال الأحمر
</option>

<option>
بنك الطعام المصري
</option>

<option>
دعم التعليم
</option>

<option>
مساعدة المحتاجين
</option>

<option>
تبرع عام
</option>

</select>

</div>

<div class="section">

<div class="label">
المبلغ
</div>

<input
type="number"
id="amount"
placeholder="اكتب مبلغ التبرع">

<div class="quickButtons">

<button onclick="setAmount(50)">
50
</button>

<button onclick="setAmount(100)">
100
</button>

<button onclick="setAmount(200)">
200
</button>

<button onclick="setAmount(500)">
500
</button>

</div>

</div>

<button class="mainBtn"
onclick="donate()">

تبرع الآن ❤️

</button>

<div class="message"
id="msg">
</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
get,
update
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey:
"AIzaSyB-vEbe_F8d6-vLZQpTfhtbv8k5n77tVw",

authDomain:
"un-me-15395.firebaseapp.com",

databaseURL:
"https://un-me-15395-default-rtdb.firebaseio.com",

projectId:
"un-me-15395"

};

const app =
initializeApp(firebaseConfig);

const db =
getDatabase(app);

let currentUser =
localStorage.getItem(
"currentUser"
);

let user;

function money(x){

return Number(x)
.toLocaleString(
"en-US"
);

}

window.setAmount =
function(v){

document.getElementById(
"amount"
).value = v;

}

async function load(){

let snap =
await get(
ref(db,
"users/" +
currentUser)
);

user =
snap.val();

document.getElementById(
"balance"
).innerText =
money(
user.balance || 0
)
+ " EGP";

}

load();

window.donate =
async function(){

let amount =
Number(
document.getElementById(
"amount"
).value
);

let type =
document.getElementById(
"donationType"
).value;

if(amount <= 0){

document.getElementById(
"msg"
).innerText =
"اكتب مبلغ صحيح";

return;
}

if(amount >
user.balance){

document.getElementById(
"msg"
).innerText =
"الرصيد غير كافي";

return;
}

let now =
new Date();

let date =
now.toLocaleDateString(
"ar-EG"
)
+
" - " +
now.toLocaleTimeString(
"ar-EG"
);

let transactions =
user.transactions || {};

transactions[
Date.now()
] = {

text:
"تم التبرع لـ "
+ type,

amount:
amount,

kind:
"minus",

date:
date,

time:
Date.now()

};

await update(
ref(db,
"users/" +
currentUser),
{

balance:
user.balance
- amount,

transactions:
transactions,

hasNotification:
true

}
);

document.getElementById(
"msg"
).innerText =
"تم التبرع بنجاح ❤️";

document.getElementById(
"amount"
).value = "";

load();

}

</script>

</body>
</html>
