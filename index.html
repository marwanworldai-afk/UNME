<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNME Bank</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Splash -->
<div id="splash">
  <div class="splashBox">
    <h1 class="linea">أهلاً</h1>
    <h1 class="lineb">بكم في بنك</h1>
    <h1 class="linec">UN ME</h1>
  </div>
</div>

<!-- Login -->
<div id="loginPage" class="hidden">
  <div class="topImage"></div>

  <div class="loginBox">
    <input type="text" id="accNumber" placeholder="رقم الحساب (6 أرقام)">
    <div class="error" id="accError"></div>

    <input type="password" id="pin" placeholder="الرقم السري (4 أرقام)">
    <div class="error" id="pinError"></div>

    <button onclick="login()">دخول</button>
  </div>
</div>

<script type="module">

  /* ===== Firebase ===== */
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyB-vEbe_F8d6-vLZQpTfhtbv8k5n77tV1w",
    authDomain: "un-me-15395.firebaseapp.com",
    databaseURL: "https://un-me-15395-default-rtdb.firebaseio.com",
    projectId: "un-me-15395"
  };
  
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  
  
  /* ===== Splash ===== */
  window.onload = function(){
    setTimeout(()=>{
      document.getElementById("splash").style.display="none";
      document.getElementById("loginPage").classList.remove("hidden");
    },3000);
  };
  
  
  /* ===== Login ===== */
  window.login = async function(){
  
    let acc = document.getElementById("accNumber").value.trim();
    let pin = document.getElementById("pin").value.trim();
  
    let accError = document.getElementById("accError");
    let pinError = document.getElementById("pinError");
  
    accError.innerText = "";
    pinError.innerText = "";
  
    // 🔴 تحقق من الإدخال
    if(acc.length !== 6 || pin.length !== 4){
      accError.innerText = "اكتب 6 أرقام";
      pinError.innerText = "اكتب 4 أرقام";
      return;
    }
  
    // 🏦 حساب البنك (Admin)
    if(acc === "123456" && pin === "1234"){
      localStorage.setItem("currentUser", acc);
      window.location.href = "bank.html";
      return;
    }
  
    try{
  
      // 🔍 البحث في Firebase
      let snapshot = await get(ref(db,"users/"+acc));
  
      if(!snapshot.exists()){
        accError.innerText = "الحساب غير موجود ❌";
        return;
      }
  
      let user = snapshot.val();
  
      // 🔐 تحقق من الرقم السري
      if(user.pin !== pin){
        pinError.innerText = "الرقم السري خطأ ❌";
        return;
      }
  
      // ✅ نجاح تسجيل الدخول
      localStorage.setItem("currentUser", acc);
      window.location.href = "client.html";
  
    }catch(err){
      accError.innerText = "حصل خطأ ❌";
      console.log(err);
    }
  
  };
  
  </script>

</body>
</html>
