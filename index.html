<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNME Bank</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= Splash ================= -->
<div id="splash">
  <div class="splashBox">
    <h1 class="linea">أهلاً</h1>
    <h1 class="lineb">بكم في بنك</h1>
    <h1 class="linec">UN ME</h1>
  </div>
</div>

<!-- ================= Login ================= -->
<div id="loginPage" class="hidden">

  <div class="topImage"></div>

  <div class="loginBox">

    <!-- رسالة الخطأ -->
    <div id="errorMsg"></div>

    <!-- رقم الحساب -->
    <input type="text" id="accNumber" placeholder="رقم الحساب">

    <!-- الرقم السري -->
    <input type="password" id="pin" placeholder="الرقم السري">

    <!-- زر الدخول -->
    <button onclick="login()">دخول</button>

  </div>

</div>

<!-- ================= Firebase + Script ================= -->
<script type="module">

/* ================= Firebase ================= */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* بيانات مشروعك */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "https://un-me-15395-default-rtdb.firebaseio.com",
  projectId: "un-me-15395"
};

/* تشغيل Firebase */
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);


/* ================= Splash ================= */

/* بعد 3 ثواني يروح لصفحة الدخول */
window.onload = function(){
  setTimeout(()=>{
    document.getElementById("splash").style.display="none";
    document.getElementById("loginPage").classList.remove("hidden");
  },3000);
};


/* ================= تسجيل الدخول ================= */

window.login = async function(){

  let acc = document.getElementById("accNumber").value.trim();
  let pin = document.getElementById("pin").value.trim();
  let error = document.getElementById("errorMsg");

  error.innerText = "";

  /* لو فاضي */
  if(!acc || !pin){
    error.innerText = "ادخل البيانات كاملة";
    return;
  }

  /* 🔥 حساب البنك */
  if(acc === "123456" && pin === "1234"){
    localStorage.setItem("currentUser", acc);
    window.location.href = "bank.html";
    return;
  }

  try{

    /* 🔥 جلب من Firebase */
    const snap = await get(ref(db, "users/" + acc));

    if(!snap.exists()){
      error.innerText = "❌ الحساب غير موجود";
      return;
    }

    let user = snap.val();

    /* التحقق من الرقم السري */
    if(user.pin === pin){

      localStorage.setItem("currentUser", acc);

      /* دخول العميل */
      window.location.href = "client.html";

    }else{
      error.innerText = "❌ الرقم السري غير صحيح";
    }

  }catch(e){
    error.innerText = "⚠️ مشكلة في الاتصال";
  }

};

</script>

</body>
</html>
