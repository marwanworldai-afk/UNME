<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>السحب</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#0f0f0f;
font-family:"Vazirmatn",sans-serif;
direction:rtl;
color:white;
}

.header{
display:flex;
align-items:center;
gap:15px;
padding:25px;
}

.backBtn{
width:55px;
height:55px;
border-radius:50%;
background:#1d1d1d;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
}

.title{
font-size:30px;
font-weight:bold;
}

.balanceCard{
width:85%;
margin:auto;
background:#00aaff;
padding:25px;
border-radius:20px;
text-align:center;
margin-top:20px;
}

.smallText{
font-size:22px;
}

.balance{
font-size:42px;
font-weight:bold;
margin-top:10px;
}

.section{
width:85%;
margin:25px auto;
}

.label{
font-size:22px;
margin-bottom:10px;
}

input{
width:100%;
height:60px;
background:#1c1c1c;
border:none;
border-radius:15px;
padding-right:15px;
font-size:20px;
color:white;
box-sizing:border-box;
}

.options{
width:85%;
margin:auto;
display:flex;
gap:15px;
}

.option{
flex:1;
background:#1a1a1a;
border:2px solid #333;
padding:20px;
border-radius:20px;
text-align:center;
cursor:pointer;
transition:.3s;
}

.option.active{
border-color:#00aaff;
background:#111f26;
}

.option span{
font-size:45px;
}

.optionName{
font-size:20px;
margin-top:10px;
}

button{
width:85%;
height:65px;
display:block;
margin:35px auto;
background:#00aaff;
border:none;
border-radius:15px;
color:white;
font-size:24px;
font-weight:bold;
cursor:pointer;
}

.message{
text-align:center;
font-size:20px;
margin-top:20px;
padding:0 20px;
}

.codeBox{
background:#1d1d1d;
padding:15px;
border-radius:15px;
margin-top:15px;
font-size:28px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="header">

<div class="backBtn"
onclick="history.back()">

<span class="material-symbols-outlined">
arrow_back
</span>

</div>

<div class="title">
سحب الأموال
</div>

</div>

<div class="balanceCard">

<div class="smallText">
رصيد الحساب الجاري
</div>

<div class="balance"
id="balance">
0 EGP
</div>

</div>

<div class="section">

<div class="label">
المبلغ
</div>

<input
type="number"
id="amount"
placeholder="اكتب مبلغ السحب">

</div>

<div class="section">

<div class="label">
طريقة السحب
</div>

</div>

<div class="options">

<div class="option active"
id="branchOption"
onclick="selectMethod('branch')">

<span class="material-symbols-outlined">
account_balance
</span>

<div class="optionName">
من الفرع
</div>

</div>

<div class="option"
id="whatsappOption"
onclick="selectMethod('whatsapp')">

<span class="material-symbols-outlined">
chat
</span>

<div class="optionName">
واتساب
</div>

</div>

</div>

<button onclick="withdrawMoney()">
تأكيد السحب
</button>

<div class="message"
id="msg"></div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
get,
update
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey:
"AIzaSyB-vEbe_F8d6-vLZQpTfhtbv8k5n77tV1w",

authDomain:
"un-me-15395.firebaseapp.com",

databaseURL:
"https://un-me-15395-default-rtdb.firebaseio.com",

projectId:
"un-me-15395"

};

const app =
initializeApp(firebaseConfig);

const db =
getDatabase(app);

let currentUser =
localStorage.getItem("currentUser");

let userData;

let method = "branch";

// حط رقم الواتساب بتاعك هنا
const whatsappNumber =
"201000000000";

function money(x){

return Number(x)
.toLocaleString("en-US");

}

async function loadUser(){

let snap =
await get(
ref(db,
"users/" + currentUser)
);

userData =
snap.val();

document.getElementById(
"balance"
).innerText =
money(
userData.balance || 0
)
+ " EGP";

}

loadUser();

window.selectMethod =
function(type){

method = type;

document.getElementById(
"branchOption"
).classList.remove(
"active"
);

document.getElementById(
"whatsappOption"
).classList.remove(
"active"
);

if(type == "branch"){

document.getElementById(
"branchOption"
).classList.add(
"active"
);

}else{

document.getElementById(
"whatsappOption"
).classList.add(
"active"
);

}

}

window.withdrawMoney =
async function(){

let amount =
Number(
document.getElementById(
"amount"
).value
);

if(amount <= 0){

document.getElementById(
"msg"
).innerText =
"اكتب مبلغ صحيح";

return;
}

if(amount >
userData.balance){

document.getElementById(
"msg"
).innerText =
"الرصيد غير كافي";

return;
}

// خصم الفلوس
let newBalance =
userData.balance
- amount;

await update(
ref(db,
"users/" + currentUser),
{
balance:
newBalance
}
);

loadUser();

if(method == "branch"){

let code =
Math.floor(
100000 +
Math.random()
* 900000
);

document.getElementById(
"msg"
).innerHTML =
"تم إنشاء طلب السحب ✅<br><br>كود الاستلام<div class='codeBox'>"
+ code +
"</div>";

}else{

let message =
"مرحباً، أريد سحب "
+ amount +
" جنيه من الحساب.";

window.open(
"https://wa.me/"
+ whatsappNumber +
"?text="
+ encodeURIComponent(
message
)
);

document.getElementById(
"msg"
).innerText =
"تم تجهيز طلب الواتساب ✅";

}

document.getElementById(
"amount"
).value = "";

}

</script>

</body>
</html>
