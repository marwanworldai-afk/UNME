<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>الشهادات والقروض</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#0f0f0f;
font-family:"Vazirmatn",sans-serif;
direction:rtl;
color:white;
}

.header{
display:flex;
align-items:center;
gap:15px;
padding:25px;
}

.backBtn{
width:55px;
height:55px;
border-radius:50%;
background:#1d1d1d;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
}

.title{
font-size:30px;
font-weight:bold;
}

.container{
width:85%;
margin:50px auto;
display:flex;
flex-direction:column;
gap:20px;
}

.box{
background:#171717;
border:2px solid #2a2a2a;
border-radius:25px;
padding:30px;
cursor:pointer;
transition:.3s;
display:flex;
align-items:center;
justify-content:space-between;
}

.box:hover{
transform:scale(1.02);
border-color:#00aaff;
background:#111f26;
}

.left{
display:flex;
align-items:center;
gap:15px;
}

.icon{
width:80px;
height:80px;
border-radius:20px;
background:#00aaff22;
display:flex;
justify-content:center;
align-items:center;
}

.icon span{
font-size:45px;
color:#56c7ff;
}

.mainText{
font-size:28px;
font-weight:bold;
}

.subText{
font-size:18px;
color:#aaa;
margin-top:5px;
}

.arrow{
font-size:35px;
color:#777;
}

</style>
</head>

<body>

<div class="header">

<div class="backBtn"
onclick="history.back()">

<span class="material-symbols-outlined">
arrow_back
</span>

</div>

<div class="title">
الشهادات والقروض
</div>

</div>

<div class="container">

<div class="box"
onclick="goCertificates()">

<div class="left">

<div class="icon">
<span class="material-symbols-outlined">
savings
</span>
</div>

<div>
<div class="mainText">
شهادات الاستثمار
</div>

<div class="subText">
استثمر فلوسك واربح 20%
</div>
</div>

</div>

<span class="material-symbols-outlined arrow">
chevron_left
</span>

</div>

<div class="box"
onclick="goLoans()">

<div class="left">

<div class="icon">
<span class="material-symbols-outlined">
account_balance
</span>
</div>

<div>
<div class="mainText">
القروض
</div>

<div class="subText">
احصل على قرض حتى 30 يوم
</div>
</div>

</div>

<span class="material-symbols-outlined arrow">
chevron_left
</span>

</div>

</div>

<script>

function goCertificates(){

window.location.href =
"certificate.html";

}

function goLoans(){

window.location.href =
"loan.html";

}

</script>

</body>
</html>
