<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الشهادات</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#0f0f0f;
font-family:"Vazirmatn",sans-serif;
direction:rtl;
color:white;
}

.toast{
position:fixed;
top:-100px;
left:50%;
transform:translateX(-50%);
background:#00aaff;
padding:15px 25px;
border-radius:15px;
transition:.3s;
z-index:999;
}

.toast.show{
top:20px;
}

.header{
display:flex;
align-items:center;
gap:15px;
padding:25px;
}

.backBtn{
width:55px;
height:55px;
border-radius:50%;
background:#1d1d1d;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
}

.title{
font-size:30px;
font-weight:bold;
}

.tabs{
width:85%;
margin:auto;
display:flex;
gap:10px;
}

.tab{
flex:1;
padding:15px;
border:none;
border-radius:15px;
background:#1d1d1d;
color:white;
font-size:20px;
cursor:pointer;
}

.active{
background:#00aaff;
}

.container{
width:85%;
margin:25px auto;
display:flex;
flex-direction:column;
gap:15px;
}

.card{
background:#1a1a1a;
border-radius:20px;
padding:20px;
border:1px solid #333;
}

.name{
font-size:24px;
font-weight:bold;
margin-bottom:10px;
}

.info{
color:#aaa;
margin:6px 0;
}

.btn{
width:100%;
height:55px;
border:none;
border-radius:15px;
background:#00aaff;
color:white;
font-size:20px;
cursor:pointer;
margin-top:15px;
}

.myTitle{
width:85%;
margin:30px auto 10px;
font-size:24px;
font-weight:bold;
}
</style>
</head>

<body>

<div id="toast" class="toast"></div>

<div class="header">

<div class="backBtn"
onclick="history.back()">
<span class="material-symbols-outlined">
arrow_back
</span>
</div>

<div class="title">
الشهادات
</div>

</div>

<div class="tabs">

<button class="tab active"
onclick="showTab('normal')"
id="normalBtn">
نمطي
</button>

<button class="tab"
onclick="showTab('default')"
id="defaultBtn">
افتراضي
</button>

</div>

<div class="container"
id="certificates"></div>

<div class="myTitle">
شهاداتي الحالية
</div>

<div class="container"
id="myCertificates">

<div style="color:#888;text-align:center">
لا توجد شهادات
</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
get,
update
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyB-vEbe_F8d6-vLZQpTfhtbv8k5n77tV1w",
authDomain:"un-me-15395.firebaseapp.com",
databaseURL:"https://un-me-15395-default-rtdb.firebaseio.com",
projectId:"un-me-15395"
};

const app =
initializeApp(firebaseConfig);

const db =
getDatabase(app);

let currentUser =
localStorage.getItem("currentUser");

let user;

const normalCertificates = [

{
name:"شهادة الشباب",
amount:500,
interest:7,
days:7
},

{
name:"الشباب الأكبر",
amount:1000,
interest:10,
days:15
},

{
name:"المستقبل",
amount:2000,
interest:13,
days:20
},

{
name:"ابن المستقبل",
amount:3000,
interest:15,
days:20
},

{
name:"الاستثمار",
amount:5000,
interest:21,
days:30
},

{
name:"الاستثمار الأكبر",
amount:10000,
interest:25,
days:30
}

];

const defaultCertificates =
[100,200,500,1000,1500,2000,3000,4000,5000];

function toast(msg){

let t =
document.getElementById("toast");

t.innerText =
msg;

t.classList.add("show");

setTimeout(()=>{
t.classList.remove("show");
},2500);

}

async function loadUser(){

let snap =
await get(
ref(db,
"users/" +
currentUser)
);

user =
snap.val();

showTab("normal");
loadMyCertificates();

}

window.showTab =
function(type){

document.getElementById(
"normalBtn"
).classList.remove(
"active"
);

document.getElementById(
"defaultBtn"
).classList.remove(
"active"
);

document.getElementById(
type=="normal"
? "normalBtn"
: "defaultBtn"
).classList.add(
"active"
);

let box =
document.getElementById(
"certificates"
);

box.innerHTML = "";

if(type=="normal"){

normalCertificates
.forEach(c=>{

box.innerHTML +=
`
<div class="card">

<div class="name">
${c.name}
</div>

<div class="info">
المبلغ:
${c.amount} جنيه
</div>

<div class="info">
الفائدة:
${c.interest}%
</div>

<div class="info">
المدة:
${c.days} يوم
</div>

<button class="btn"
onclick="buyCertificate(
'${c.name}',
${c.amount},
${c.interest},
${c.days}
)">
ربط الشهادة
</button>

</div>
`;

});

}else{

defaultCertificates
.forEach(v=>{

box.innerHTML +=
`
<div class="card">

<div class="name">
شهادة افتراضية
</div>

<div class="info">
المبلغ:
${v} جنيه
</div>

<div class="info">
الفائدة:
20%
</div>

<div class="info">
المدة:
30 يوم
</div>

<button class="btn"
onclick="buyCertificate(
'شهادة افتراضية',
${v},
20,
30
)">
ربط الشهادة
</button>

</div>
`;

});

}

}

window.buyCertificate =
async function(
name,
amount,
interest,
days
){

if(
(user.balance||0)
< amount
){

toast(
"الرصيد غير كافي"
);

return;
}

let certs =
user.certificates
|| {};

let id =
Date.now();

certs[id] = {

name,
amount,
interest,
days,
start:
Date.now()

};

let trans =
user.transactions
|| {};

trans[id] = {

text:
"تم ربط " +
name,

amount:
amount,

kind:
"minus",

date:
new Date()
.toLocaleString(
"ar-EG"
),

time:
Date.now()

};

await update(
ref(db,
"users/" +
currentUser),
{

balance:
user.balance
- amount,

certificates:
certs,

transactions:
trans,

hasNotification:
true

}
);

toast(
"تم ربط الشهادة ✅"
);

loadUser();

}

function loadMyCertificates(){

let box =
document.getElementById(
"myCertificates"
);

box.innerHTML = "";

let certs =
user.certificates
|| {};

let arr =
Object.entries(
certs
);

if(arr.length==0){

box.innerHTML =
`
<div style="
text-align:center;
color:#888">
لا توجد شهادات
</div>
`;

return;
}

arr.forEach(([id,c])=>{

box.innerHTML +=
`
<div class="card">

<div class="name">
${c.name}
</div>

<div class="info">
${c.amount} جنيه
</div>

<div class="info">
${c.interest}% فائدة
</div>

<div class="info">
${c.days} يوم
</div>

<button class="btn"
onclick="cancelCertificate('${id}')">
فك الشهادة
</button>

</div>
`;

});

}

window.cancelCertificate =
async function(id){

let cert =
user.certificates[id];

let returned =
cert.amount * 0.5;

delete
user.certificates[id];

await update(
ref(db,
"users/" +
currentUser),
{

balance:
(user.balance||0)
+ returned,

certificates:
user.certificates

}
);

toast(
"تم فك الشهادة"
);

loadUser();

}

loadUser();

</script>

</body>
</html>
