<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حساب العميل</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#0f0f0f;
  color:#fff;
  direction:rtl;
  font-family:"Vazirmatn",sans-serif;
}

.header{
  display:flex;
  align-items:center;
  gap:25px;
  padding:40px;
}

.avatar{
  width:110px;height:110px;border-radius:70%;
  overflow:hidden;
  cursor:pointer;
}
.avatar img{width:100%;height:100%;}

.hello{font-size:40px;font-weight:bold;}
.fullName{font-size:40px;font-weight:bold;}

.balanceCard{
  width:85%;
  height:250px;
  margin:auto;
  background:#00aaff;
  border-radius:15px;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom: 150px;
}

.sd{font-size:45px;font-weight:bold;margin-bottom:40px;}
.balanceValue{font-size:45px;font-weight:bold;}

.detailsBtn{text-align:center;cursor:pointer;}
.detailsIcon{font-size:75px;color:#fff;}
.er{font-weight:bold;font-size:45px;}

.actions{
  width:85%;
  margin:30px auto;
  display:flex;
  justify-content:space-between;
  text-align:center;
  margin-top:95px;
  margin-bottom:100px;
}

.iconCircle{
  width:140px;height:140px;border-radius:50%;
  background:rgb(58,58,58);
  color:#56c7ff;
  display:flex;align-items:center;justify-content:center;
  margin:auto;cursor:pointer;
  transition:0.3s;
}

.iconCircle:hover{
  background:#00aaff;
  color:#fff;
  transform:scale(1.1);
}

.actionName{margin-top:8px;font-size:45px;}
.material-symbols-outlined{font-size:100px;}

.sectionTitle{
  width:85%;
  margin:20px auto;
  font-size:38px;
  font-weight:bold;
  font-weight: bold;
}

/* الحسابات */
.cards{
  width:85%;
  margin:auto;
  display:flex;
  gap:15px;
}

.card{
  width:50%;
  background:#0c0c0c;
  border-radius:20px;
  padding:15px;
  display:flex;
  align-items:center;
  gap:10px;
  border:2px solid #444;
  height: 200px;
  margin-bottom: 100px;
}

.accImg{width:230px;height:230px;}
.accImg img{width:100%;}

.accType{color:#00aaff;font-size:42px;margin-bottom:30px;}
.accNum,.accBalance{font-size:28px;margin-bottom:5px;}

/* لايف ستايل */
.lifestyleCard{
  width:50%;
  background:#0c0c0c;
  border-radius:20px;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border:2px solid #444;
  height:150px;
  margin-bottom: 100px;
}

.smallText{font-size:28px;color:#aaa;}
.bigText{font-size:32px;font-weight:bold;}

.lifeImg{
  width:200px;
  height:200px;
}
.lifeImg img{width:100%;
margin-top: 35px;
}

/* صورة البطاقة */
.cardImageContainer{
  width:90%;
  margin:30px auto;
  display:flex;
  justify-content:center;
}

.cardImageContainer img{
  width:95%;
  border-radius:20px;
}

.infoContainer{
position:relative;
display:inline-block;
}

.notificationDot{
position:absolute;
top:10px;
right:10px;
width:18px;
height:18px;
background:red;
border-radius:50%;
display:none;
border:2px solid white;
}
</style>
</head>

<body>

<div class="header">
  <div class="avatar" onclick="goProfile()">
    <img src="man.jpeg">
  </div>

  <div>
    <div class="hello" id="hello">اهلا</div>
    <div class="fullName" id="fullName"></div>
  </div>
</div>

<div class="balanceCard">
  <div>
    <div class="sd">اجمالي الارصده</div>
    <div class="balanceValue" id="totalBalance">EGP</div>
  </div>
  <div class="detailsBtn" onclick="goDetails()">

    <div class="infoContainer">
  
      <span class="material-symbols-outlined detailsIcon">
        info
      </span>
  
      <div
      class="notificationDot"
      id="notificationDot">
      </div>
  
    </div>
  
    <div class="er">
      تفاصيل الارصده
    </div>
  
  </div>
  
</div>

<div class="actions">

  <div onclick="goDonate()">
    <div class="iconCircle">
      <span class="material-symbols-outlined">
        volunteer_activism
      </span>
    </div>
    <div class="actionName">تبرعات</div>
  </div>

  <div onclick="goTransfer()">
    <div class="iconCircle">
      <span class="material-symbols-outlined">
        sync_alt
      </span>
    </div>
    <div class="actionName">تحويل</div>
  </div>

  <div onclick="goWithdraw()">
    <div class="iconCircle">
      <span class="material-symbols-outlined">
        account_balance_wallet
      </span>
    </div>
    <div class="actionName">سحب</div>
  </div>

  <div onclick="goCertificate()">
    <div class="iconCircle">
      <span class="material-symbols-outlined">
        savings
      </span>
    </div>
    <div class="actionName">شهادة</div>
  </div>

</div>

<div class="sectionTitle">الحسابات</div>

<div class="cards">

  <div class="card" onclick="goSaving()">
    <div class="accImg">
      <img src="sm.png">
    </div>
    <div>
      <div class="accType">التوفير</div>
      <div class="accNum" id="acc1"></div>
      <div class="accBalance" id="bal1"></div>
    </div>
  </div>

  <div class="card">
    <div class="accImg">
      <img src="sm.png">
    </div>
    <div>
      <div class="accType">الجاري</div>
      <div class="accNum" id="acc2"></div>
      <div class="accBalance" id="bal2"></div>
    </div>
  </div>

</div>

<!-- لايف ستايل -->
<div class="sectionTitle">لايف ستايل</div>

<div class="cards">

  <div class="lifestyleCard">
    <div>
      <div class="smallText">تحقق من</div>
      <div class="bigText">الانفاق</div>
    </div>
    <div class="lifeImg">
      <img src="s.png">
    </div>
  </div>

  <div class="lifestyleCard">
    <div>
      <div class="smallText">تحقق من</div>
      <div class="bigText">المكافآت</div>
    </div>
    <div class="lifeImg">
      <img src="h.png">
    </div>
  </div>

</div>

<!-- صورة البطاقة -->
<div class="sectionTitle">البطاقات</div>

<div class="cardImageContainer">
  <img src="visa.png"> <!-- حط صورتك -->
</div>

<script type="module"> 

  import { initializeApp }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  
  import {
    getDatabase,
    ref,
    get,
    update
  }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
  
  const firebaseConfig = {
  
    apiKey: "AIzaSyB-vEbe_F8d6-vLZQpTfhtbv8k5n77tV1w",
  
    authDomain: "un-me-15395.firebaseapp.com",
  
    databaseURL:
    "https://un-me-15395-default-rtdb.firebaseio.com",
  
    projectId: "un-me-15395"
  
  };
  
  const app = initializeApp(firebaseConfig);
  
  const db = getDatabase(app);
  
  let currentUser =
  localStorage.getItem("currentUser");
  
  function formatMoney(num){
  
    return Number(num).toLocaleString('en-US');
  
  }
  
  async function loadUser(){
  
    let snap =
    await get(ref(db,"users/"+currentUser));
  
    let user = snap.val();
  
// إظهار أو إخفاء الإشعار
if(user.hasNotification){

document.getElementById(
"notificationDot"
).style.display =
"block";

}else{

document.getElementById(
"notificationDot"
).style.display =
"none";

}

    if(!user) return;
  
    // إنشاء حساب توفير تلقائي بـ 0 جنيه
    if(user.savingBalance == null){
  
      await update(
        ref(db,"users/"+currentUser),
        {
  
          savingBalance: 0,
  
          savingLastUpdate:
          Date.now()
  
        }
      );
  
      user.savingBalance = 0;
  
      user.savingLastUpdate =
      Date.now();
    }
  
    // حساب الفايدة 15% كل 30 يوم
    let savingBalance =
    user.savingBalance || 0;
  
    let lastUpdate =
    user.savingLastUpdate || Date.now();
  
    const THIRTY_DAYS =
    30 * 24 * 60 * 60 * 1000;
  
    let now = Date.now();
  
    let passedMonths =
    Math.floor(
      (now - lastUpdate)
      / THIRTY_DAYS
    );
  
    if(passedMonths > 0){
  
      for(let i = 0; i < passedMonths; i++){
  
        savingBalance +=
        savingBalance * 0.15;
  
      }
  
      savingBalance =
      Math.floor(savingBalance);
  
      await update(
        ref(db,"users/"+currentUser),
        {
  
          savingBalance:
          savingBalance,
  
          savingLastUpdate:
          lastUpdate +
          (passedMonths * THIRTY_DAYS)
  
        }
      );
    }
  
    let names =
    user.name.split(" ");
  
    document.getElementById("hello")
    .innerText =
    "اهلا " + names[0];
  
    document.getElementById("fullName")
    .innerText =
    names.slice(1).join(" ");
  
    // إجمالي الرصيد
    let total =
    (user.balance || 0)
    + savingBalance;
  
    document.getElementById(
      "totalBalance"
    ).innerText =
    formatMoney(total)
    + " EGP";
  
    // حساب التوفير
    document.getElementById("acc1")
    .innerText =
    "رقم الحساب: " + user.acc;
  
    document.getElementById("bal1")
    .innerText =
    formatMoney(savingBalance)
    + " EGP";
  
    // الحساب الجاري
    document.getElementById("acc2")
    .innerText =
    "رقم الحساب: " + user.acc;
  
    document.getElementById("bal2")
    .innerText =
    formatMoney(user.balance || 0)
    + " EGP";
  }
  
  loadUser();
  
  // الصفحات
  
  window.goProfile = function(){
  
    window.location.href =
    "profile.html";
  
  }
  
  window.goDetails = function(){
  
    window.location.href =
    "details.html";
  
  }
  
  window.goTransfer = function(){
  
    window.location.href =
    "transfer.html";
  
  }
  
  window.goWithdraw = function(){
  
    window.location.href =
    "withdraw.html";
  
  }
  
  window.goCertificate = function(){
  
    window.location.href =
    "top.html";
  
  }
  
  window.goDonate = function(){
  
    window.location.href =
    "donate.html";
  
  }
  
  window.goSaving = function(){
  
    window.location.href =
    "saving.html";
  
  }
  
  </script>

</body>
</html>
