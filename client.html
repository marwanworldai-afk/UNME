<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حساب العميل</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:#fff;
  direction:rtl;
}

/* ===== الهيدر ===== */
.header{
  display:flex;
  align-items:center;
  gap:25px;
  padding:40px;
}

.avatar{
  width:90px;height:90px;border-radius:70%;
  overflow:hidden;border:2px solid #0f0f0f;
}
.avatar img{width:100%;height:100%;}

/* 🔥 الخط */
.hello{
  font-size:30px;
  font-weight:bold;
  margin-bottom: 5px;
}

.fullName{
  font-size:30px;
  font-weight:bold;
  color:rgb(255, 255, 255);
}

/* ===== كارت الرصيد ===== */
.balanceCard{
  width:85%;
  height: 200px;
  margin:auto;
  background:#00aaff;
  border-radius:15px;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:rgb(255, 255, 255);
}

.sd{
  color: rgb(255, 255, 255);
  font-size:35px;
  font-weight:bold;
  margin-bottom: 20px;
}

.balanceValue{
  font-size:35px;
  font-weight:bold;
}

.circle{
  width:80px;height:80px;
  background:#000;border-radius:50%;
  margin:auto;
  margin-bottom: 10px;
  margin-left: 20px;
}

.er{
  font-weight: bold;
  font-size: 25px;
}

/* ===== الأيقونات ===== */
.actions{
  width:85%;
  margin:30px auto;
  display:flex;
  justify-content:space-between;
  text-align:center;
  margin-top: 95px;
  margin-bottom: 45px;
  color: #ffffff;
  font-weight: bold;
  font-size: xx-large;
}

.iconCircle{
  width:110px;height:110px;border-radius:50%;
  background:rgb(58, 58, 58);
  color: #56c7ff;
  display:flex;align-items:center;justify-content:center;
  margin:auto;cursor:pointer;transition:0.3s;
}

.iconCircle:hover{
  background:#00aaff;color:rgb(255, 255, 255);
  transform:scale(1.1);
}

.actionName{margin-top:8px;font-size:35px;}
.material-symbols-outlined{font-size:60px;}

/* ===== الحسابات ===== */
.accountSection{
  width:85%;
  margin:20px auto;
  height: 200px;

}

.slider{
  overflow:hidden;
}

.cards{
  display:flex;
}  

.card{
  min-width:100%;
  background:#0c0c0c;
  border-radius:20px;
  padding:15px;
  display:flex;
  align-items:center;
  gap:15px;
  height: 200px;


  border:2px solid rgb(73, 73, 73);
  box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.accImg{
  width:100px;height:100px;
}
.accImg img{width:100%;}

.accType{
  color:#00aaff;
  font-size:35px;
  margin-bottom: 20px;
}

.accNum,.accBalance{
  color:#fff;
  font-size:27px;
  margin-bottom: 10px;
}

/* dots */
.dots{
  text-align:center;
  margin-top:10px;
}

.dot{
  width:10px;height:10px;
  border-radius:50%;
  display:inline-block;
  margin:0 5px;
  background:#555;
}

.active{background:#00aaff;}
</style>
</head>

<body>

<!-- ===== الهيدر ===== -->
<div class="header">
  <div class="avatar">
    <img src="man.jpeg">
  </div>

  <div>
    <div class="hello" id="hello">اهلا</div>
    <div class="fullName" id="fullName"></div>
  </div>
</div>

<!-- ===== كارت الرصيد ===== -->
<div class="balanceCard">
  <div>
    <div class="sd">اجمالي الارصده</div>
    <div class="balanceValue" id="totalBalance">EGP</div>
  </div>

  <div>
    <div class="circle"></div>
    <div class="er">تفاصيل الارصده</div>
  </div>
</div>

<!-- ===== الأيقونات ===== -->
<div class="actions">

  <div>
    <div class="iconCircle"><span class="material-symbols-outlined">volunteer_activism</span></div>
    <div class="actionName">تبرعات</div>
  </div>

  <div>
    <div class="iconCircle"><span class="material-symbols-outlined">sync_alt</span></div>
    <div class="actionName">تحويل</div>
  </div>

  <div>
    <div class="iconCircle"><span class="material-symbols-outlined">account_balance_wallet</span></div>
    <div class="actionName">سحب</div>
  </div>

  <div>
    <div class="iconCircle"><span class="material-symbols-outlined">savings</span></div>
    <div class="actionName">شهادة</div>
  </div>

</div>

<!-- ===== الحسابات ===== -->
<div class="accountSection">

  <div class="slider" id="slider">
    <div class="cards" id="cards">

      <!-- توفير -->
      <div class="card">
        <div class="accImg">
          <img src="sm.png">
        </div>

        <div>
          <div class="accType">التوفير</div>
          <div class="accNum" id="acc1"></div>
          <div class="accBalance" id="bal1"></div>
        </div>
      </div>

      <!-- جاري -->
      <div class="card">
        <div class="accImg">
          <img src="sm.png">
        </div>

        <div>
          <div class="accType">الجاري</div>
          <div class="accNum" id="acc2"></div>
          <div class="accBalance" id="bal2"></div>
        </div>
      </div>

    </div>
  </div>

  <div class="dots">
    <span class="dot active" id="dot1"></span>
    <span class="dot" id="dot2"></span>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB-vEbe_F8d6-vLZQpTfhtbv8k5n77tV1w",
  authDomain: "un-me-15395.firebaseapp.com",
  databaseURL: "https://un-me-15395-default-rtdb.firebaseio.com",
  projectId: "un-me-15395"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentUser = localStorage.getItem("currentUser");

/* 🔥 فورمات فلوس */
function formatMoney(num){
  return num.toLocaleString('en-US');
}

/* تحميل البيانات */
async function loadUser(){
  let snap = await get(ref(db,"users/"+currentUser));
  let user = snap.val();

  let names = user.name.split(" ");

  document.getElementById("hello").innerText = "اهلا " + names[0];
  document.getElementById("fullName").innerText = names.slice(1).join(" ");

  document.getElementById("totalBalance").innerText =
    formatMoney(user.balance || 0) + " EGP";

  document.getElementById("acc1").innerText = "رقم الحساب: " + user.acc;
  document.getElementById("bal1").innerText =
    formatMoney(user.balance) + " EGP";

  document.getElementById("acc2").innerText = "رقم الحساب: " + user.acc;
  document.getElementById("bal2").innerText =
    formatMoney(user.balance) + " EGP";
}

loadUser();

/* ===== سوايب احترافي ===== */
let startX = 0;
let current = 0;
let isDragging = false;
let moveX = 0;

const slider = document.getElementById("slider");
const cards = document.getElementById("cards");

slider.addEventListener("mousedown", (e)=>{
  startX = e.clientX;
  isDragging = true;
  cards.style.transition = "none";
});

slider.addEventListener("mousemove", (e)=>{
  if(!isDragging) return;

  moveX = e.clientX;
  let diff = moveX - startX;

  cards.style.transform =
    `translateX(${diff - (current * slider.offsetWidth)}px)`;
});

slider.addEventListener("mouseup", ()=>{
  finishSwipe();
});

slider.addEventListener("mouseleave", ()=>{
  if(isDragging) finishSwipe();
});

function finishSwipe(){
  isDragging = false;

  let diff = moveX - startX;
  let threshold = slider.offsetWidth * 0.25;

  if(diff < -threshold && current < 1){
    current++;
  }else if(diff > threshold && current > 0){
    current--;
  }

  updateSlider();
}

function updateSlider(){
  cards.style.transition = "0.35s ease";
  cards.style.transform =
    `translateX(-${current * slider.offsetWidth}px)`;

  document.getElementById("dot1")
    .classList.toggle("active", current===0);

  document.getElementById("dot2")
    .classList.toggle("active", current===1);
}

</script>

</body>
</html>
