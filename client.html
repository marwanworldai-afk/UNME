<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حساب العميل</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#0f0f0f;
  color:#fff;
  direction:rtl;
  font-family:"Vazirmatn",sans-serif;
  overflow-x:hidden;
  box-sizing:border-box;
}

*{
  box-sizing:border-box;
}

.header{
  display:flex;
  align-items:center;
  gap:20px;
  padding:20px;
}

.avatar{
  width:90px;
  height:90px;
  border-radius:50%;
  overflow:hidden;
  cursor:pointer;
  flex-shrink:0;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.hello{
  font-size:32px;
  font-weight:bold;
}

.fullName{
  font-size:32px;
  font-weight:bold;
}

.balanceCard{
  width:90%;
  min-height:180px;
  margin:auto;
  background:#00aaff;
  border-radius:20px;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:50px;
}

.sd{
  font-size:32px;
  font-weight:bold;
  margin-bottom:15px;
}

.balanceValue{
  font-size:34px;
  font-weight:bold;
  word-break:break-word;
}

.detailsBtn{
  text-align:center;
  cursor:pointer;
}

.detailsIcon{
  font-size:55px !important;
  color:white;
}

.er{
  font-size:22px;
  font-weight:bold;
}

.actions{
  width:90%;
  margin:40px auto;
  display:flex;
  justify-content:space-between;
  gap:10px;
  text-align:center;
}

.iconCircle{
  width:90px;
  height:90px;
  border-radius:50%;
  background:#3a3a3a;
  color:#56c7ff;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
  cursor:pointer;
  transition:.3s;
}

.iconCircle:hover{
  background:#00aaff;
  color:white;
}

.material-symbols-outlined{
  font-size:50px !important;
}

.actionName{
  margin-top:10px;
  font-size:20px;
}

.sectionTitle{
  width:90%;
  margin:25px auto;
  font-size:32px;
  font-weight:bold;
}

.cards{
  width:90%;
  margin:auto;
  display:flex;
  gap:15px;
}

.card{
  width:50%;
  background:#0c0c0c;
  border-radius:20px;
  padding:15px;
  display:flex;
  align-items:center;
  gap:10px;
  border:2px solid #444;
  min-height:140px;
}

.accImg{
  width:70px;
  height:70px;
  flex-shrink:0;
}

.accImg img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.accType{
  color:#00aaff;
  font-size:26px;
  margin-bottom:10px;
}

.accNum,
.accBalance{
  font-size:18px;
}

.lifestyleCard{
  width:50%;
  background:#0c0c0c;
  border-radius:20px;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border:2px solid #444;
  min-height:120px;
}

.smallText{
  font-size:18px;
  color:#aaa;
}

.bigText{
  font-size:24px;
  font-weight:bold;
}

.lifeImg{
  width:70px;
  height:70px;
}

.lifeImg img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.cardImageContainer{
  width:90%;
  margin:30px auto;
  display:flex;
  justify-content:center;
}

.cardImageContainer img{
  width:100%;
  max-width:500px;
  border-radius:20px;
}

.infoContainer{
  position:relative;
  display:inline-block;
}

.notificationDot{
  position:absolute;
  top:5px;
  right:5px;
  width:14px;
  height:14px;
  background:red;
  border-radius:50%;
  display:none;
  border:2px solid white;
}

/* الموبايل */
@media (max-width:768px){

  .header{
    padding:15px;
  }

  .avatar{
    width:70px;
    height:70px;
  }

  .hello,
  .fullName{
    font-size:20px;
  }

  .balanceCard{
    flex-direction:row;
    padding:15px;
    min-height:auto;
  }

  .sd{
    font-size:22px;
  }

  .balanceValue{
    font-size:20px;
  }

  .detailsIcon{
    font-size:42px !important;
  }

  .er{
    font-size:16px;
  }

  .actions{
    gap:5px;
  }

  .iconCircle{
    width:65px;
    height:65px;
  }

  .material-symbols-outlined{
    font-size:34px !important;
  }

  .actionName{
    font-size:14px;
  }

  .sectionTitle{
    font-size:24px;
  }

  .cards{
    flex-direction:column;
  }

  .card,
  .lifestyleCard{
    width:100%;
  }

  .accType{
    font-size:20px;
  }

  .accNum,
  .accBalance{
    font-size:15px;
  }

  .smallText{
    font-size:14px;
  }

  .bigText{
    font-size:20px;
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="avatar" onclick="goProfile()">
    <img src="man.jpeg">
  </div>

  <div>
    <div class="hello" id="hello">اهلا</div>
    <div class="fullName" id="fullName"></div>
  </div>
</div>

<div class="balanceCard">
  <div>
    <div class="sd">اجمالي الارصده</div>
    <div class="balanceValue" id="totalBalance">EGP</div>
  </div>
  <div class="detailsBtn" onclick="goDetails()">

    <div class="infoContainer">
  
      <span class="material-symbols-outlined detailsIcon">
        info
      </span>
  
      <div
      class="notificationDot"
      id="notificationDot">
      </div>
  
    </div>
  
    <div class="er">
      تفاصيل الارصده
    </div>
  
  </div>
  
</div>

<div class="actions">

  <div onclick="goDonate()">
    <div class="iconCircle">
      <span class="material-symbols-outlined">
        volunteer_activism
      </span>
    </div>
    <div class="actionName">تبرعات</div>
  </div>

  <div onclick="goTransfer()">
    <div class="iconCircle">
      <span class="material-symbols-outlined">
        sync_alt
      </span>
    </div>
    <div class="actionName">تحويل</div>
  </div>

  <div onclick="goWithdraw()">
    <div class="iconCircle">
      <span class="material-symbols-outlined">
        account_balance_wallet
      </span>
    </div>
    <div class="actionName">سحب</div>
  </div>

  <div onclick="goCertificate()">
    <div class="iconCircle">
      <span class="material-symbols-outlined">
        savings
      </span>
    </div>
    <div class="actionName">شهادة</div>
  </div>

</div>

<div class="sectionTitle">الحسابات</div>

<div class="cards">

  <div class="card" onclick="goSaving()">
    <div class="accImg">
      <img src="sm.png">
    </div>
    <div>
      <div class="accType">التوفير</div>
      <div class="accNum" id="acc1"></div>
      <div class="accBalance" id="bal1"></div>
    </div>
  </div>

  <div class="card">
    <div class="accImg">
      <img src="sm.png">
    </div>
    <div>
      <div class="accType">الجاري</div>
      <div class="accNum" id="acc2"></div>
      <div class="accBalance" id="bal2"></div>
    </div>
  </div>

</div>

<!-- لايف ستايل -->
<div class="sectionTitle">لايف ستايل</div>

<div class="cards">

  <div class="lifestyleCard">
    <div>
      <div class="smallText">تحقق من</div>
      <div class="bigText">الانفاق</div>
    </div>
    <div class="lifeImg">
      <img src="s.png">
    </div>
  </div>

  <div class="lifestyleCard">
    <div>
      <div class="smallText">تحقق من</div>
      <div class="bigText">المكافآت</div>
    </div>
    <div class="lifeImg">
      <img src="h.png">
    </div>
  </div>

</div>

<!-- صورة البطاقة -->
<div class="sectionTitle">البطاقات</div>

<div class="cardImageContainer">
  <img src="visa.png"> <!-- حط صورتك -->
</div>

<script type="module"> 

  import { initializeApp }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  
  import {
    getDatabase,
    ref,
    get,
    update
  }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
  
  const firebaseConfig = {
  
    apiKey: "AIzaSyB-vEbe_F8d6-vLZQpTfhtbv8k5n77tV1w",
  
    authDomain: "un-me-15395.firebaseapp.com",
  
    databaseURL:
    "https://un-me-15395-default-rtdb.firebaseio.com",
  
    projectId: "un-me-15395"
  
  };
  
  const app = initializeApp(firebaseConfig);
  
  const db = getDatabase(app);
  
  let currentUser =
  localStorage.getItem("currentUser");
  
  function formatMoney(num){
  
    return Number(num).toLocaleString('en-US');
  
  }
  
  async function loadUser(){
  
    let snap =
    await get(ref(db,"users/"+currentUser));
  
    let user = snap.val();
  
// إظهار أو إخفاء الإشعار
if(user.hasNotification){

document.getElementById(
"notificationDot"
).style.display =
"block";

}else{

document.getElementById(
"notificationDot"
).style.display =
"none";

}

    if(!user) return;
  
    // إنشاء حساب توفير تلقائي بـ 0 جنيه
    if(user.savingBalance == null){
  
      await update(
        ref(db,"users/"+currentUser),
        {
  
          savingBalance: 0,
  
          savingLastUpdate:
          Date.now()
  
        }
      );
  
      user.savingBalance = 0;
  
      user.savingLastUpdate =
      Date.now();
    }
  
    // حساب الفايدة 15% كل 30 يوم
    let savingBalance =
    user.savingBalance || 0;
  
    let lastUpdate =
    user.savingLastUpdate || Date.now();
  
    const THIRTY_DAYS =
    30 * 24 * 60 * 60 * 1000;
  
    let now = Date.now();
  
    let passedMonths =
    Math.floor(
      (now - lastUpdate)
      / THIRTY_DAYS
    );
  
    if(passedMonths > 0){
  
      for(let i = 0; i < passedMonths; i++){
  
        savingBalance +=
        savingBalance * 0.15;
  
      }
  
      savingBalance =
      Math.floor(savingBalance);
  
      await update(
        ref(db,"users/"+currentUser),
        {
  
          savingBalance:
          savingBalance,
  
          savingLastUpdate:
          lastUpdate +
          (passedMonths * THIRTY_DAYS)
  
        }
      );
    }
  
    let names =
    user.name.split(" ");
  
    document.getElementById("hello")
    .innerText =
    "اهلا " + names[0];
  
    document.getElementById("fullName")
    .innerText =
    names.slice(1).join(" ");
  
    // إجمالي الرصيد
    let total =
    (user.balance || 0)
    + savingBalance;
  
    document.getElementById(
      "totalBalance"
    ).innerText =
    formatMoney(total)
    + " EGP";
  
    // حساب التوفير
    document.getElementById("acc1")
    .innerText =
    "رقم الحساب: " + user.acc;
  
    document.getElementById("bal1")
    .innerText =
    formatMoney(savingBalance)
    + " EGP";
  
    // الحساب الجاري
    document.getElementById("acc2")
    .innerText =
    "رقم الحساب: " + user.acc;
  
    document.getElementById("bal2")
    .innerText =
    formatMoney(user.balance || 0)
    + " EGP";
  }
  
  loadUser();
  
  // الصفحات
  
  window.goProfile = function(){
  
    window.location.href =
    "profile.html";
  
  }
  
  window.goDetails = function(){
  
    window.location.href =
    "details.html";
  
  }
  
  window.goTransfer = function(){
  
    window.location.href =
    "transfer.html";
  
  }
  
  window.goWithdraw = function(){
  
    window.location.href =
    "withdraw.html";
  
  }
  
  window.goCertificate = function(){
  
    window.location.href =
    "top.html";
  
  }
  
  window.goDonate = function(){
  
    window.location.href =
    "donate.html";
  
  }
  
  window.goSaving = function(){
  
    window.location.href =
    "saving.html";
  
  }
  
  </script>

</body>
</html>
