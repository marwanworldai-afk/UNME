<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حساب العميل</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#0f0f0f;
  color:#fff;
  direction:rtl;
  font-family: "Vazirmatn", sans-serif;
}

.header{
  display:flex;
  align-items:center;
  gap:25px;
  padding:40px;
}

.avatar{
  width:90px;height:90px;border-radius:70%;
  overflow:hidden;
  cursor:pointer;
}
.avatar img{width:100%;height:100%;}

.hello{font-size:30px;font-weight:bold;}
.fullName{font-size:30px;font-weight:bold;}

.balanceCard{
  width:85%;
  height:200px;
  margin:auto;
  background:#00aaff;
  border-radius:15px;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.sd{font-size:35px;font-weight:bold;margin-bottom:40px;}
.balanceValue{font-size:35px;font-weight:bold;}

.detailsBtn{text-align:center;cursor:pointer;}
.detailsIcon{font-size:55px;color:#fff;}
.er{font-weight:bold;font-size:25px;}

.actions{
  width:85%;
  margin:30px auto;
  display:flex;
  justify-content:space-between;
  text-align:center;
  margin-top:95px;
  margin-bottom:85px;
  font-weight:bold;
  font-size:xx-large;
}

.iconCircle{
  width:110px;height:110px;border-radius:50%;
  background:rgb(58, 58, 58);
  color:#56c7ff;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
  cursor:pointer;
  transition:0.3s;
}

.iconCircle:hover{
  background:#00aaff;
  color:#fff;
  transform:scale(1.1);
}

.actionName{margin-top:8px;font-size:35px;}
.material-symbols-outlined{font-size:60px;}

.sectionTitle{
  width:85%;
  margin:20px auto 10px;
  font-size:28px;
  font-weight:bold;
}

/* ===== الحسابات ===== */
.cards{
  width:85%;
  margin:auto;
  display:flex;
  gap:15px;
}

.card{
  width:50%;
  background:#0c0c0c;
  border-radius:20px;
  padding:15px;
  display:flex;
  align-items:center;
  gap:10px;
  border:2px solid rgb(73,73,73);
}

.accImg{width:80px;height:80px;}
.accImg img{width:100%;}

.accType{color:#00aaff;font-size:22px;margin-bottom:10px;}
.accNum,.accBalance{font-size:18px;margin-bottom:5px;}

/* ===== لايف ستايل ===== */
.lifestyleCard{
  width:50%;
  background:#0c0c0c;
  border-radius:20px;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border:2px solid rgb(73,73,73);
  height:80px;
}

.smallText{font-size:18px;color:#aaa;}
.bigText{font-size:22px;font-weight:bold;}

.lifeImg{
  width:60px;
  height:60px;
}
.lifeImg img{width:100%;}

/* ===== البطاقة البنكية ===== */
.bankCard{
  width:85%;
  height:200px;
  margin:25px auto;
  border-radius:20px;
  background:url("card.jpg");
  background-size:cover;
  background-position:center;
  position:relative;
  overflow:hidden;
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.bankTitle{
  font-size:24px;
  font-weight:bold;
}

.bankContent{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.bankRight{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.bankName{
  font-size:20px;
  font-weight:bold;
}

.bankAcc{
  font-size:16px;
  color:#ddd;
}

.bankBalance{
  font-size:24px;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- ===== الهيدر ===== -->
<div class="header">
  <div class="avatar" onclick="goProfile()">
    <img src="man.jpeg">
  </div>

  <div>
    <div class="hello" id="hello">اهلا</div>
    <div class="fullName" id="fullName"></div>
  </div>
</div>

<!-- ===== الرصيد ===== -->
<div class="balanceCard">
  <div>
    <div class="sd">اجمالي الارصده</div>
    <div class="balanceValue" id="totalBalance">EGP</div>
  </div>

  <div class="detailsBtn" onclick="goDetails()">
    <span class="material-symbols-outlined detailsIcon">info</span>
    <div class="er">تفاصيل الارصده</div>
  </div>
</div>

<!-- ===== الايقونات ===== -->
<div class="actions">

  <div>
    <div class="iconCircle"><span class="material-symbols-outlined">volunteer_activism</span></div>
    <div class="actionName">تبرعات</div>
  </div>

  <div>
    <div class="iconCircle"><span class="material-symbols-outlined">sync_alt</span></div>
    <div class="actionName">تحويل</div>
  </div>

  <div>
    <div class="iconCircle"><span class="material-symbols-outlined">account_balance_wallet</span></div>
    <div class="actionName">سحب</div>
  </div>

  <div>
    <div class="iconCircle"><span class="material-symbols-outlined">savings</span></div>
    <div class="actionName">شهادة</div>
  </div>

</div>

<!-- ===== الحسابات ===== -->
<div class="sectionTitle">الحسابات</div>

<div class="cards">
  <div class="card">
    <div class="accImg"><img src="sm.png"></div>
    <div>
      <div class="accType">التوفير</div>
      <div class="accNum" id="acc1"></div>
      <div class="accBalance" id="bal1"></div>
    </div>
  </div>

  <div class="card">
    <div class="accImg"><img src="sm.png"></div>
    <div>
      <div class="accType">الجاري</div>
      <div class="accNum" id="acc2"></div>
      <div class="accBalance" id="bal2"></div>
    </div>
  </div>
</div>

<!-- ===== لايف ستايل ===== -->
<div class="sectionTitle">لايف ستايل</div>

<div class="cards">
  <div class="lifestyleCard">
    <div>
      <div class="smallText">تحقق من</div>
      <div class="bigText">الانفاق</div>
    </div>
    <div class="lifeImg">
      <img src="sm.png">
    </div>
  </div>

  <div class="lifestyleCard">
    <div>
      <div class="smallText">تحقق من</div>
      <div class="bigText">المكافآت</div>
    </div>
    <div class="lifeImg">
      <img src="sm.png">
    </div>
  </div>
</div>

<!-- ===== البطاقة البنكية ===== -->
<div class="bankCard">

  <div class="bankTitle">البطاقات</div>

  <div class="bankContent">

    <div class="bankRight">
      <div class="bankName" id="cardName"></div>
      <div class="bankAcc" id="cardAcc"></div>
    </div>

    <div class="bankBalance" id="cardBalance"></div>

  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "un-me-15395.firebaseapp.com",
  databaseURL: "https://un-me-15395-default-rtdb.firebaseio.com",
  projectId: "un-me-15395"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentUser = localStorage.getItem("currentUser");

function formatMoney(num){
  return num.toLocaleString('en-US');
}

async function loadUser(){
  let snap = await get(ref(db,"users/"+currentUser));
  let user = snap.val();

  let names = user.name.split(" ");

  document.getElementById("hello").innerText = "اهلا " + names[0];
  document.getElementById("fullName").innerText = names.slice(1).join(" ");

  document.getElementById("totalBalance").innerText =
    formatMoney(user.balance || 0) + " EGP";

  document.getElementById("acc1").innerText = "رقم الحساب: " + user.acc;
  document.getElementById("bal1").innerText = formatMoney(user.balance) + " EGP";

  document.getElementById("acc2").innerText = "رقم الحساب: " + user.acc;
  document.getElementById("bal2").innerText = formatMoney(user.balance) + " EGP";

  /* البطاقة */
  document.getElementById("cardName").innerText = user.name;
  document.getElementById("cardAcc").innerText = "رقم الحساب: " + user.acc;
  document.getElementById("cardBalance").innerText = formatMoney(user.balance) + " EGP";
}

loadUser();

window.goProfile = function(){
  window.location.href = "profile.html";
}

window.goDetails = function(){
  window.location.href = "details.html";
}

</script>

</body>
</html>
