<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حساب العميل</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
  direction:rtl;
}

/* ===== الهيدر ===== */
.header{
  display:flex;
  align-items:center;
  gap:15px;
  padding:20px;
}

.avatar{
  width:60px;height:60px;border-radius:50%;
  overflow:hidden;border:2px solid #00aaff;
}
.avatar img{width:100%;height:100%;}

.hello{font-size:18px;}
.fullName{font-size:14px;color:#aaa;}

/* ===== كارت الرصيد ===== */
.balanceCard{
  width:85%;
  margin:auto;
  background:#00aaff;
  border-radius:15px;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:#000;
}

.balanceValue{
  font-size:28px;
  font-weight:bold;
}

.circle{
  width:50px;height:50px;
  background:#000;border-radius:50%;
  margin:auto;
}

/* ===== الأيقونات ===== */
.actions{
  width:90%;
  margin:30px auto;
  display:flex;
  justify-content:space-between;
  text-align:center;
}

.iconCircle{
  width:65px;height:65px;border-radius:50%;
  background:#111;
  display:flex;align-items:center;justify-content:center;
  margin:auto;cursor:pointer;transition:0.3s;
}

.iconCircle:hover{
  background:#00aaff;color:#000;
  transform:scale(1.1);
}

.actionName{margin-top:8px;font-size:14px;}
.material-symbols-outlined{font-size:28px;}

/* ===== الحسابات ===== */
.accountSection{
  width:90%;
  margin:20px auto;
}

.slider{
  overflow:hidden;
}

.cards{
  display:flex;
  transition:0.3s ease;
}

.card{
  min-width:100%;
  background:#222;
  border-radius:15px;
  padding:15px;
  display:flex;
  align-items:center;
  gap:15px;
}

.accImg{
  width:60px;height:60px;
}
.accImg img{width:100%;}

.accType{
  color:#00aaff;
  font-size:18px;
}

.accNum,.accBalance{
  color:#fff;
  font-size:14px;
}

/* dots */
.dots{
  text-align:center;
  margin-top:10px;
}

.dot{
  width:10px;height:10px;
  border-radius:50%;
  display:inline-block;
  margin:0 5px;
  background:#555;
}

.active{background:#00aaff;}
</style>
</head>

<body>

<!-- ===== الهيدر ===== -->
<div class="header">
  <div class="avatar">
    <img src="user.png">
  </div>

  <div>
    <div class="hello" id="hello">اهلا ...</div>
    <div class="fullName" id="fullName"></div>
  </div>
</div>

<!-- ===== كارت الرصيد ===== -->
<div class="balanceCard">
  <div>
    <div>اجمالي الارصده</div>
    <div class="balanceValue" id="totalBalance">0 EGP</div>
  </div>

  <div>
    <div class="circle"></div>
    <div>تفاصيل الارصده</div>
  </div>
</div>

<!-- ===== الأيقونات ===== -->
<div class="actions">

  <div>
    <div class="iconCircle"><span class="material-symbols-outlined">volunteer_activism</span></div>
    <div class="actionName">تبرعات</div>
  </div>

  <div>
    <div class="iconCircle"><span class="material-symbols-outlined">sync_alt</span></div>
    <div class="actionName">تحويل</div>
  </div>

  <div>
    <div class="iconCircle"><span class="material-symbols-outlined">account_balance_wallet</span></div>
    <div class="actionName">سحب</div>
  </div>

  <div>
    <div class="iconCircle"><span class="material-symbols-outlined">savings</span></div>
    <div class="actionName">شهادة</div>
  </div>

</div>

<!-- ===== الحسابات ===== -->
<div class="accountSection">

  <div class="slider" id="slider">
    <div class="cards" id="cards">

      <!-- توفير -->
      <div class="card">
        <div class="accImg">
          <img src="saving.png">
        </div>

        <div>
          <div class="accType">التوفير</div>
          <div class="accNum" id="acc1"></div>
          <div class="accBalance" id="bal1"></div>
        </div>
      </div>

      <!-- جاري -->
      <div class="card">
        <div class="accImg">
          <img src="current.png">
        </div>

        <div>
          <div class="accType">الجاري</div>
          <div class="accNum" id="acc2"></div>
          <div class="accBalance" id="bal2"></div>
        </div>
      </div>

    </div>
  </div>

  <div class="dots">
    <span class="dot active" id="dot1"></span>
    <span class="dot" id="dot2"></span>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB-vEbe_F8d6-vLZQpTfhtbv8k5n77tV1w",
  authDomain: "un-me-15395.firebaseapp.com",
  databaseURL: "https://un-me-15395-default-rtdb.firebaseio.com",
  projectId: "un-me-15395"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentUser = localStorage.getItem("currentUser");

async function loadUser(){
  let snap = await get(ref(db,"users/"+currentUser));
  let user = snap.val();

  let names = user.name.split(" ");

  document.getElementById("hello").innerText = "اهلا " + names[0];
  document.getElementById("fullName").innerText = names.slice(1).join(" ");

  document.getElementById("totalBalance").innerText =
    (user.balance || 0) + " EGP";

  document.getElementById("acc1").innerText = "رقم الحساب: " + user.acc;
  document.getElementById("bal1").innerText = user.balance + " EGP";

  document.getElementById("acc2").innerText = "رقم الحساب: " + user.acc;
  document.getElementById("bal2").innerText = user.balance + " EGP";
}

loadUser();

/* ===== سوايب حقيقي ===== */
let startX = 0;
let current = 0;
let isDragging = false;

const slider = document.getElementById("slider");
const cards = document.getElementById("cards");

slider.addEventListener("touchstart", (e)=>{
  startX = e.touches[0].clientX;
  isDragging = true;
});

slider.addEventListener("touchmove", (e)=>{
  if(!isDragging) return;

  let moveX = e.touches[0].clientX;
  let diff = moveX - startX;

  cards.style.transition = "none";
  cards.style.transform = `translateX(${diff - (current * slider.offsetWidth)}px)`;
});

slider.addEventListener("touchend", (e)=>{
  isDragging = false;

  let endX = e.changedTouches[0].clientX;
  let diff = endX - startX;

  if(diff < -50) current = 1;
  if(diff > 50) current = 0;

  updateSlider();
});



function updateSlider(){
  cards.style.transition = "0.3s ease";
  cards.style.transform = `translateX(-${current * slider.offsetWidth}px)`;

  document.getElementById("dot1").classList.toggle("active", current===0);
  document.getElementById("dot2").classList.toggle("active", current===1);
}

// ===== دعم الماوس =====
let isMouseDown = false;

slider.addEventListener("mousedown", (e)=>{
  startX = e.clientX;
  isMouseDown = true;
  isDragging = true;
});

slider.addEventListener("mousemove", (e)=>{
  if(!isMouseDown) return;

  let diff = e.clientX - startX;

  cards.style.transition = "none";
  cards.style.transform = `translateX(${diff - (current * slider.offsetWidth)}px)`;
});

slider.addEventListener("mouseup", (e)=>{
  isMouseDown = false;
  isDragging = false;

  let diff = e.clientX - startX;

  if(diff < -50) current = 1;
  if(diff > 50) current = 0;

  updateSlider();
});

slider.addEventListener("mouseleave", ()=>{
  isMouseDown = false;
});

</script>

</body>
</html>
