<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
   *{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#ffffff;
direction:rtl;
min-height:100vh;
padding:10px;
}

.paper{
width:100%;
max-width:100%;
margin:auto;
background:rgb(2, 2, 2);
padding:20px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,.3);
}

.header{
text-align:center;
padding-bottom:15px;
border-bottom:2px solid rgb(0, 0, 0);
}

.header h2{
color:#00aaff;
font-size:28px;
}

.title{
text-align:center;
font-size:24px;
font-weight:bold;
margin:20px 0;
color:rgb(0, 0, 0);
}

.bankTitle{
font-size:20px;
font-weight:bold;
margin:20px 0;
color:#00aaff;
}

.inputBox{
margin-bottom:18px;
}

.inputBox label{
display:block;
margin-bottom:8px;
font-weight:bold;
color:rgb(0, 0, 0);
}

.inputBox input,
.inputBox select{
width:100%;
height:50px;
padding:0 15px;
border:2px solid rgb(17, 17, 17);
border-radius:10px;
font-size:16px;
outline:none;
background:rgb(187, 187, 187);
}

.inputBox input:focus,
.inputBox select:focus{
border-color:#00aaff;
}

input[readonly]{
background:#ff4040;
cursor:not-allowed;
}

hr{
margin:25px 0;
border:none;
height:1px;
background:#ddd;
}

button{
width:100%;
height:55px;
border:none;
border-radius:12px;
background:#00aaff;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#008fd1;
}

/* الرقم القومي */

.nidBoxes{
display:flex;
justify-content:center;
gap:4px;
flex-wrap:nowrap;
overflow:hidden;
}

.nid{
width:22px !important;
height:50px !important;
padding:0 !important;
text-align:center;
font-size:18px !important;
font-weight:bold;
}

/* الرقم السري */

.pinBoxes{
display:flex;
justify-content:center;
gap:8px;
}

.pin{
width:60px !important;
height:60px !important;
padding:0 !important;
text-align:center;
font-size:22px !important;
font-weight:bold;
}

/* الموبايل */

@media(max-width:480px){

body{
padding:8px;
}

.paper{
padding:15px;
border-radius:12px;
}

.header h2{
font-size:24px;
}

.title{
font-size:20px;
}

.bankTitle{
font-size:18px;
}

.nid{
width:20px !important;
height:45px !important;
font-size:16px !important;
}

.pin{
width:55px !important;
height:55px !important;
font-size:20px !important;
}

button{
height:50px;
font-size:16px;
}

}
  </style>
</head>
<body>
    <form id="accountForm">

        <div class="inputBox">
            <label>الاسم بالكامل</label>
            <input
                type="text"
                id="name"
                placeholder="ادخل الاسم بالكامل"
            >
        </div>
    
        <div class="inputBox">
            <label>الرقم القومي</label>
    
            <div class="nidBoxes">
    
                <input type="text" maxlength="1" class="nid">
                <input type="text" maxlength="1" class="nid">
                <input type="text" maxlength="1" class="nid">
                <input type="text" maxlength="1" class="nid">
                <input type="text" maxlength="1" class="nid">
                <input type="text" maxlength="1" class="nid">
                <input type="text" maxlength="1" class="nid">
    
                <input type="text" maxlength="1" class="nid">
                <input type="text" maxlength="1" class="nid">
                <input type="text" maxlength="1" class="nid">
                <input type="text" maxlength="1" class="nid">
                <input type="text" maxlength="1" class="nid">
                <input type="text" maxlength="1" class="nid">
                <input type="text" maxlength="1" class="nid">
    
            </div>
        </div>
    
        <div class="inputBox">
            <label>رقم الهاتف</label>
            <input
                type="text"
                id="phone"
                placeholder="ادخل رقم الهاتف"
            >
        </div>
    
        <div class="inputBox">
            <label>المحافظة</label>
    
            <select id="address">
    
                <option value="">اختر المحافظة</option>
    
                <option>القاهرة</option>
                <option>الجيزة</option>
                <option>الإسكندرية</option>
                <option>القليوبية</option>
                <option>الشرقية</option>
                <option>الدقهلية</option>
                <option>البحيرة</option>
                <option>الغربية</option>
                <option>كفر الشيخ</option>
                <option>المنوفية</option>
                <option>دمياط</option>
                <option>بورسعيد</option>
                <option>الإسماعيلية</option>
                <option>السويس</option>
                <option>شمال سيناء</option>
                <option>جنوب سيناء</option>
                <option>بني سويف</option>
                <option>الفيوم</option>
                <option>المنيا</option>
                <option>أسيوط</option>
                <option>سوهاج</option>
                <option>قنا</option>
                <option>الأقصر</option>
                <option>أسوان</option>
                <option>البحر الأحمر</option>
                <option>الوادي الجديد</option>
                <option>مطروح</option>
    
            </select>
        </div>
    
        <hr>
    
        <div class="bankTitle">
            بيانات الحساب
        </div>
    
        <div class="inputBox">
            <label>رقم الحساب</label>
            <input
                type="text"
                id="acc"
                readonly
                placeholder="سيتم إنشاؤه تلقائياً"
            >
        </div>
    
        <div class="inputBox">
    
            <label>الرقم السري</label>
    
            <div class="pinBoxes">
    
                <input type="password" maxlength="1" class="pin">
                <input type="password" maxlength="1" class="pin">
                <input type="password" maxlength="1" class="pin">
                <input type="password" maxlength="1" class="pin">
    
            </div>
    
        </div>
    
        <button
            type="button"
            onclick="createAccount()"
        >
            إنشاء الحساب
        </button>
    
    </form>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import {
          getDatabase,
          ref,
          set,
          get
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
        
        /* Firebase */
        
        const firebaseConfig = {
          apiKey: "YOUR_API_KEY",
          authDomain: "un-me-15395.firebaseapp.com",
          databaseURL: "https://un-me-15395-default-rtdb.firebaseio.com",
          projectId: "un-me-15395"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        /* توليد رقم حساب */
        
        async function generateAccountNumber(){
        
          let acc;
          let exists = true;
        
          while(exists){
        
            acc = Math.floor(
              100000 + Math.random() * 900000
            ).toString();
        
            const snap = await get(
              ref(db,"users/" + acc)
            );
        
            exists = snap.exists();
          }
        
          return acc;
        }
        
        /* عند فتح الصفحة */
        
        window.onload = async function(){
        
          document.getElementById("acc").value =
          await generateAccountNumber();
        
          /* الرقم القومي */
        
          document.querySelectorAll(".nid")
          .forEach((box,index,arr)=>{
        
            box.addEventListener("input",()=>{
        
              box.value =
              box.value.replace(/[^0-9]/g,"");
        
              if(
                box.value.length === 1 &&
                index < arr.length - 1
              ){
                arr[index + 1].focus();
              }
        
            });
        
          });
        
          /* الرقم السري */
        
          document.querySelectorAll(".pin")
          .forEach((box,index,arr)=>{
        
            box.addEventListener("input",()=>{
        
              box.value =
              box.value.replace(/[^0-9]/g,"");
        
              if(
                box.value.length === 1 &&
                index < arr.length - 1
              ){
                arr[index + 1].focus();
              }
        
            });
        
          });
        
        };
        
        /* إنشاء الحساب */
        
        window.createAccount = async function(){
        
          let name =
          document.getElementById("name")
          .value.trim();
        
          let phone =
          document.getElementById("phone")
          .value.trim();
        
          let address =
          document.getElementById("address")
          .value.trim();
        
          let acc =
          document.getElementById("acc")
          .value.trim();
        
          /* تجميع الرقم القومي */
        
          let nid = "";
        
          document
          .querySelectorAll(".nid")
          .forEach(input=>{
        
            nid += input.value;
        
          });
        
          /* تجميع الرقم السري */
        
          let pin = "";
        
          document
          .querySelectorAll(".pin")
          .forEach(input=>{
        
            pin += input.value;
        
          });
        
          /* التحقق */
        
          if(
            !name ||
            !phone ||
            !address
          ){
            alert("يرجى ملء جميع البيانات");
            return;
          }
        
          if(nid.length !== 14){
            alert("الرقم القومي يجب أن يكون 14 رقم");
            return;
          }
        
          if(phone.length !== 11){
            alert("رقم الهاتف يجب أن يكون 11 رقم");
            return;
          }
        
          if(pin.length !== 4){
            alert("الرقم السري يجب أن يكون 4 أرقام");
            return;
          }
        
          /* بيانات المستخدم */
        
          const userData = {
        
            name:name,
        
            nid:nid,
        
            phone:phone,
        
            address:address,
        
            acc:acc,
        
            pin:pin,
        
            balance:0,
        
            savingBalance:0,
        
            savingLastUpdate:
            Date.now(),
        
            profileImage:
            "man.jpeg",
        
            hasNotification:false
        
          };
        
          /* حفظ */
        
          await set(
            ref(db,"users/" + acc),
            userData
          );
        
          alert(
            "تم إنشاء الحساب بنجاح\nرقم الحساب: "
            + acc
          );
        
          /* رقم حساب جديد */
        
          document.getElementById("acc").value =
          await generateAccountNumber();
        
          /* تنظيف الحقول */
        
          document.getElementById("name").value = "";
          document.getElementById("phone").value = "";
          document.getElementById("address").value = "";
        
          document
          .querySelectorAll(".nid")
          .forEach(input=>{
            input.value = "";
          });
        
          document
          .querySelectorAll(".pin")
          .forEach(input=>{
            input.value = "";
          });
        
          window.location.href =
          "bank.html";
        
        };
        </script>
  </body>
</html>
