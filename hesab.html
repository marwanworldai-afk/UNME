<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فتح حساب</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  direction:rtl;
}

/* الورقة */
.paper{
  width:90%;
  margin:20px auto;
  background:#fff;
  padding:20px;
  border:3px solid #000;
}

/* عنوان */
h2{
  text-align:center;
}

/* صف */
.row{
  margin:10px 0;
  display:flex;
  align-items:center;
  gap:10px;
}

label{
  width:140px;
  font-weight:bold;
}

/* inputs */
input{
  flex:1;
  padding:8px;
}

/* الرقم القومي */
.national{
  display:flex;
  gap:4px;
  flex:1;
}

.national input{
  width:22px;
  height:30px;
  text-align:center;
}

/* خط */
hr{
  border:1px dashed #000;
  margin:20px 0;
}

/* زر */
.btn{
  width:70%;
  margin:20px auto;
  display:block;
  padding:12px;
  background:#00aaff;
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:16px;
}
</style>

</head>

<body>

<div class="paper">

<h2>بيانات العميل</h2>

<div class="row">
  <label>الاسم:</label>
  <!-- 👇 هنا التعديل -->
  <input type="text" id="name">
</div>

<div class="row">
  <label>الرقم القومي:</label>
  <div class="national" id="nid"></div>
</div>

<div class="row">
  <label>المواليد:</label>
  <input placeholder="يوم / شهر / سنة">
</div>

<div class="row">
  <label>السن:</label>
  <input>
</div>

<div class="row">
  <label>الهاتف:</label>
  <input>
</div>

<div class="row">
  <label>العنوان:</label>
  <input>
</div>

<hr>

<h2>حساب العميل</h2>

<div class="row">
  <label>رقم الحساب:</label>
  <input id="accountNumber" readonly>
</div>

<div class="row">
  <label>الرقم السري:</label>
  <input id="pin">
</div>

<button class="btn" onclick="createAccount()">تم فتح الحساب</button>

</div>

<script>

/* ===== إنشاء 14 مربع ===== */
let nidDiv = document.getElementById("nid");

for(let i=0;i<14;i++){
  let input = document.createElement("input");
  input.maxLength = 1;

  input.oninput = function(){
    if(this.value.length==1 && this.nextElementSibling){
      this.nextElementSibling.focus();
    }
  }

  nidDiv.appendChild(input);
}

/* ===== توليد رقم حساب ===== */
function generateAccount(){
  return Math.floor(100000 + Math.random()*900000);
}

document.getElementById("accountNumber").value = generateAccount();

/* ===== إنشاء الحساب ===== */
function createAccount(){

  let name = document.getElementById("name").value; // 👈 هنا الحل
  let acc = document.getElementById("accountNumber").value;
  let pin = document.getElementById("pin").value;

  let users = JSON.parse(localStorage.getItem("users")) || [];

  users.push({
    name: name,
    acc: acc,
    pin: pin,
    balance: 0
  });

  localStorage.setItem("users", JSON.stringify(users));

  alert("تم فتح الحساب بنجاح ✅");
}

</script>

</body>
</html>
